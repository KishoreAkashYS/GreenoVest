{% extends "layout.html" %}

{% block title %}
    Carbonsight
{% endblock %}

{% block main %}
<div class="page-title dark-background"></div>

<!--Analysis form-->
<section id="carbon" class="scenario section" style="padding:0px;">
    <div class="container">
      <div class="formbold-main-wrapper">
          <div id="form-container" class="formbold-form-wrapper" >
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h4><i class="bi bi-cloud-haze2-fill"></i> <b>{{ company }} - Carbon Intelligence</b></h4>
                    <p class="text-muted"><i>Trace, Transform, Thrive</i></p><br>
                </div>
                <div>
                    <a href="{{ url_for('profile', ticker=ticker) }}" class="text-decoration-none fw-bold" style="color: #1e4356;">
                      <i class="bi bi-arrow-left"></i> Back to Dashboard
                    </a>
                </div>
              </div>
            <form action="{{url_for('carbon', ticker=ticker)}}" method="POST">
                <div class="formbold-steps">
                    <ul>
                        <li class="formbold-step-menu1 active">
                            <span>1</span>
                            Company Details 
                        </li>
                        <li class="formbold-step-menu2">
                            <span>2</span>
                            Scope & Scenario
                        </li>
                        <li class="formbold-step-menu3">
                          <span>3</span>
                          Review & Submit
                      </li>
                    </ul>
                </div>
        
                <div class="formbold-form-step-1 active">
                    <div class="formbold-input-flex">
                    <div>
                        <label for="sector" class="formbold-form-label">
                        Sector
                        </label>
                        <h5 class="formbold-form-value">{{ sector }}</h5> 
                        <input type="hidden" id="sector" name="sector" value="{{ sector }}">
                    </div>
                    <div>
                        <label for="company" class="formbold-form-label">Company Name</label>
                        <h5 class="formbold-form-value">{{ company }}</h5>
                        <input type="hidden" id="company" name="company" value="{{ company }}">
                    </div>
                    </div>
                    <div class="formbold-input-flex">
                    <div>
                        <label for="forecast-window" class="formbold-form-label">
                          Forecast Window
                        </label>
                        <select name="forecast-window" id="forecast-window" class="formbold-form-input" >
                            <option value="Short Term">Short Term</option>
                            <option value="Medium Term">Medium Term</option>
                            <option value="Long Term">Long Term</option>
                        </select>
                    </div>
                    <div>
                        <div>
                            <label for="timeline" class="formbold-form-label">Timeline in years
                                <span class="tooltip-icon">
                                <i class="fas fa-info-circle"></i>
                                <span class="tooltip-text">
                                    <strong>Select the number of years of data you want</strong>
                                </span>
                            </span>
                            </label>
                        </div>
                        <input type="number" id="timeline" name="timeline" value="2" min="1" max="7" class="styled-number-input">
                    </div>
                    </div>    
                </div>

                <div class="formbold-form-step-2">
                    <label for="ipcc" class="formbold-form-label">IPCC Scenarios
                        <span class="tooltip-icon">
                            <i class="fas fa-info-circle"></i>
                            <span class="tooltip-text">
                                <strong>SSP1-1.9:</strong> Sustainable pathway, aligns with 1.5°C<br>
                                <strong>SSP1-2.6:</strong> Green economy, limits warming to 2°C<br>
                                <strong>SSP2-4.5:</strong> Middle path, ~2.7°C warming<br>
                                <strong>SSP3-7.0:</strong> Regional rivalry, ~3.5°C<br>
                                <strong>SSP5-8.5:</strong> Fossil-heavy growth, ~4.5°C warming
                            </span>
                        </span>
                    </label>
                    <select id="ipcc" name="ipcc" data-placeholder="Select IPCC Scenarios" multiple data-multi-select>
                        <option value="SSP1-1.9 (Sustainability + Very Low Emissions)">SSP1-1.9 (Sustainability + Very Low Emissions)</option>
                        <option value="SSP1-2.6 (Sustainability + Low Emissions)">SSP1-2.6 (Sustainability + Low Emissions)</option>
                        <option value="SSP2-4.5 (Middle of the Road)">SSP2-4.5 (Middle of the Road)</option>
                        <option value="SSP3-7.0 (Regional Rivalry + High Emissions)">SSP3-7.0 (Regional Rivalry + High Emissions)</option>
                        <option value="SSP5-8.5 (Fossil-fueled Development)">SSP5-8.5 (Fossil-fueled Development)</option>
                    </select>
                    <div class="formbold-input-flex">
                        <div>
                            <label for="scope" class="formbold-form-label">Select Scope
                                <span class="tooltip-icon">
                                    <i class="fas fa-info-circle"></i>
                                    <span class="tooltip-text">
                                        <strong>Scope 1:</strong> Direct emissions from owned or controlled sources (e.g., fuel combustion, company vehicles)<br>
                                        <strong>Scope 2:</strong> Indirect emissions from the generation of purchased electricity, steam, heating, and cooling<br>
                                        <strong>Scope 3:</strong> All other indirect emissions in the value chain (e.g., supply chain, business travel, waste disposal)
                                    </span>
                                </span>
                            </label>
                            <select name="scope" id="scope" data-placeholder="Select Emission Scopes" multiple data-multi-select>
                                    <option value="Scope 1 - Direct Emissions">Scope 1 - Direct Emissions</option>
                                    <option value="Scope 2 - Indirect (Energy) Emissions">Scope 2 - Indirect (Energy) Emissions</option>
                                    <option value="Scope 3 - Value Chain Emissions">Scope 3 - Value Chain Emissions</option>
                            </select>
                        </div>
                        
                        <div>
                            <label for="investment-preference" class="formbold-form-label">Investment Preference</label>
                            <select name="investment-preference" id="investment-preference" data-placeholder="Select Preferences" multiple data-multi-select>
                                <option value="Net Zero">Net Zero</option>
                                <option value="Carbon Neutral">Carbon Neutral</option>
                                <option value="Science Based Target[SBTi]">Science Based Target[SBTi]</option>
                            </select>
                        </div>
                    </div>
                    
                </div>
        
                <div class="formbold-form-step-3">
                  <ul id="review-list"></ul>
                </div>
        
                <div class="formbold-form-btn-wrapper">
                  <button class="formbold-back-btn">
                    Back
                  </button>
        
                  <button class="formbold-btn">
                      Next Step
                      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <g clip-path="url(#clip0_1675_1807)">
                      <path d="M10.7814 7.33312L7.20541 3.75712L8.14808 2.81445L13.3334 7.99979L8.14808 13.1851L7.20541 12.2425L10.7814 8.66645H2.66675V7.33312H10.7814Z" fill="white"/>
                      </g>
                      <defs>
                      <clipPath id="clip0_1675_1807">
                      <rect width="16" height="16" fill="white"/>
                      </clipPath>
                      </defs>
                      </svg>
                  </button>
                </div>
        </form>
      </div>
    </div>
  </div>
</section>


<script src="{{ url_for('static', filename='js/carbon-form.js') }}"></script>
<script src="{{ url_for('static', filename='js/multiselect.js') }}"></script> 
{% endblock %}
